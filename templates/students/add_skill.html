{% extends 'base.html' %}

{% block title %}Add Skill - PIMS{% endblock %}

{% block page_title %}Add Skill{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0">Add New Skill</h5>
                </div>
                <div class="card-body">
                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">Skill Name</label>
                            <input type="text" name="skill_name" class="form-control" placeholder="e.g., Python, Django, React" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Category</label>
                            <select name="category" class="form-select" required>
                                <option value="">Select Category</option>
                                <option value="PROGRAMMING">Programming Language</option>
                                <option value="FRAMEWORK">Framework/Library</option>
                                <option value="DATABASE">Database</option>
                                <option value="TOOL">Tool/Software</option>
                                <option value="LANGUAGE">Language</option>
                                <option value="OTHER">Other</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Proficiency Level</label>
                            <select name="proficiency" class="form-select" required>
                                <option value="">Select Level</option>
                                <option value="BEGINNER">Beginner</option>
                                <option value="INTERMEDIATE">Intermediate</option>
                                <option value="ADVANCED">Advanced</option>
                                <option value="EXPERT">Expert</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Years of Experience</label>
                            <input type="number" name="years_of_experience" class="form-control" step="0.5" min="0" placeholder="0.5" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 mb-2">Add Skill</button>
                        <a href="{% url 'students:skills' %}" class="btn btn-secondary w-100">Cancel</a>          
                              </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
